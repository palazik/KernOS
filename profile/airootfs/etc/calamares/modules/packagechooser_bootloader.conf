---
mode: required
method: legacy
default: grub

labels:
  step: "Bootloader"

items:
  - id: grub
    packages:
      - grub
      - efibootmgr
      - os-prober
    name: "GRUB"
    description: "Most compatible bootloader for BIOS and UEFI systems."
    screenshot: ":/images/no-selection.png"

  - id: systemd-boot
    packages:
      - efibootmgr
    name: "systemd-boot"
    description: "Simple UEFI boot manager. Best with the EFI system partition mounted at /boot."
    screenshot: ":/images/no-selection.png"

  - id: efistub
    packages:
      - efibootmgr
    name: "EFISTUB"
    description: "Direct UEFI kernel boot entry. Requires the kernel and initramfs on the EFI system partition."
    screenshot: ":/images/no-selection.png"

  - id: refind
    packages:
      - refind
      - efibootmgr
    name: "rEFInd"
    description: "Graphical UEFI boot manager."
    screenshot: ":/images/no-selection.png"

  - id: limine
    packages:
      - limine
      - efibootmgr
    name: "Limine"
    description: "Modern bootloader with simple text configuration."
    screenshot: ":/images/no-selection.png"
