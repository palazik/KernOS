---
mode: required
method: packages
default: kde

labels:
  step: "Desktop"

items:
  - id: cli
    packages: []
    name: "CLI only"
    description: "Install a text-mode KernOS system without a desktop environment."
    screenshot: ":/images/no-selection.png"

  - id: kde
    packages:
      - plasma-meta
      - kde-applications-meta
      - sddm
      - konsole
      - dolphin
      - kate
      - plasma-nm
      - xdg-desktop-portal-kde
    name: "KDE Plasma"
    description: "Full KDE Plasma desktop with common KDE applications."
    screenshot: ":/images/kde.png"

  - id: gnome
    packages:
      - gnome
      - gdm
      - gnome-tweaks
      - xdg-desktop-portal-gnome
    name: "GNOME"
    description: "GNOME desktop session with GDM."
    screenshot: ":/images/gnome.png"

  - id: hyprland
    packages:
      - kernos-hyprland-settings
      - hyprland
      - xdg-desktop-portal-hyprland
      - waybar
      - wofi
      - mako
      - alacritty
      - brightnessctl
      - network-manager-applet
      - pamixer
      - polkit-kde-agent
      - swaybg
      - wl-clipboard
      - wlogout
      - wob
      - xorg-xwayland
      - sddm
    name: "Hyprland"
    description: "CachyOS Hyprland desktop settings."
    screenshot: ":/images/no-selection.png"

  - id: niri-noctalia
    packages:
      - kernos-niri-noctalia-settings
      - niri
      - noctalia-shell
      - xwayland-satellite
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-gtk
      - adw-gtk-theme
      - alacritty
      - gnome-keyring
      - wl-clipboard
      - sddm
    name: "Niri + Noctalia"
    description: "CachyOS Niri settings with Noctalia Shell."
    screenshot: ":/images/no-selection.png"

  - id: i3
    packages:
      - xorg-server
      - xorg-xinit
      - i3-wm
      - i3status
      - i3lock
      - dmenu
      - lightdm
      - lightdm-gtk-greeter
    name: "i3"
    description: "Classic X11 tiling window manager."
    screenshot: ":/images/no-selection.png"

  - id: xfce
    packages:
      - xfce4
      - xfce4-goodies
      - lightdm
      - lightdm-gtk-greeter
    name: "XFCE"
    description: "Lightweight GTK desktop."
    screenshot: ":/images/no-selection.png"

  - id: lxqt
    packages:
      - lxqt
      - sddm
      - xdg-desktop-portal-lxqt
    name: "LXQt"
    description: "Lightweight Qt desktop."
    screenshot: ":/images/no-selection.png"

  - id: sway
    packages:
      - sway
      - swaybg
      - swaylock
      - waybar
      - foot
      - xdg-desktop-portal-wlr
      - sddm
    name: "Sway"
    description: "i3-compatible Wayland compositor."
    screenshot: ":/images/no-selection.png"
