---
dontChroot: false
timeout: 60
script:
  - "userdel -r liveuser 2>/dev/null || true"
  - "rm -f /etc/sudoers.d/10-liveuser"
  - "rm -f /etc/sddm.conf.d/kernos-live.conf"
  - "rm -f /etc/systemd/system/kernos-liveuser.service"
  - "rm -f /etc/xdg/autostart/kernos-installer-online.desktop /etc/xdg/autostart/kernos-installer-offline.desktop"
