---
dontChroot: false
timeout: 60
script:
  - "userdel -r liveuser 2>/dev/null || true"
  - "rm -f /etc/sudoers.d/10-liveuser"
  - "rm -f /etc/sddm.conf.d/kernos-live.conf"
  - "rm -f /etc/systemd/system/kernos-liveuser.service"
  - "rm -f /etc/xdg/autostart/kernos-installer-online.desktop /etc/xdg/autostart/kernos-installer-offline.desktop"
  - "cp /run/archiso/airootfs/etc/os-release /etc/os-release"
  - "mkdir -p /etc/fastfetch"
  - "cp /run/archiso/airootfs/etc/fastfetch/config.jsonc /etc/fastfetch/config.jsonc"
  - "cp /run/archiso/airootfs/etc/fastfetch/kernos.txt /etc/fastfetch/kernos.txt"
  - "cp /run/archiso/airootfs/etc/profile.d/kernos.sh /etc/profile.d/kernos.sh"
