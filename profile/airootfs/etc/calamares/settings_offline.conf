---
modules-search: [ local ]

instances:
  - id: offline
    module: packages
    config: packages_offline.conf
  - id: cleanup
    module: shellprocess
    config: shellprocess_cleanup.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - networkcfg
      - hwclock
      - packages@offline
      - displaymanager
      - kernosbootloader
      - services-systemd
      - shellprocess@cleanup
      - umount
  - show:
      - finished

branding: kernos
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: true
quit-at-end: false
